openapi: 3.0.0
info:
  title: MiniDevOpsHub API
  version: 1.0.0
paths:
  /api/apps:
    get:
      summary: List all apps
      responses:
        '200': {description: OK}
    post:
      summary: Create app
      responses:
        '200': {description: OK}
  /api/apps/{id}:
    get:
      summary: Get app
      responses:
        '200': {description: OK}
    delete:
      summary: Delete app
      responses:
        '204': {description: Deleted}
  /api/workers:
    get:
      summary: List all workers
      responses:
        '200': {description: OK}
    post:
      summary: Register worker
      responses:
        '200': {description: OK}
  /api/workers/{id}:
    get:
      summary: Get worker
      responses:
        '200': {description: OK}
  /api/apps/{id}/deploy:
    post:
      summary: Deploy app (blue/green)
      responses:
        '200': {description: OK}
  /api/apps/{id}/rollback:
    post:
      summary: Rollback app
      responses:
        '204': {description: Rolled back}
  /api/apps/{id}/deployments:
    get:
      summary: List deployments
      responses:
        '200': {description: OK}
  /api/apps/{id}/logs:
    get:
      summary: Get logs
      responses:
        '200': {description: OK}
  /api/apps/{id}/build-logs:
    get:
      summary: Get build logs
      responses:
        '200': {description: OK}
  /api/apps/{id}/repo:
    get:
      summary: Get repo info
      responses:
        '200': {description: OK}
